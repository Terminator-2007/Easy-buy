<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop - Track Your Order</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="stylebg.css">
  <style>
    /* ── Delivery Page Styles ── */
    .delivery-page { max-width: 820px; margin: 40px auto 80px; padding: 0 20px; }
    .delivery-page h2 {
      font-family: var(--font-logo); font-size: 2rem; font-weight: 400;
      margin-bottom: 28px; border-bottom: 2px solid var(--text-primary);
      padding-bottom: 10px; display: inline-block;
    }

    /* Pincode checker */
    .pin-check-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 6px; padding: 28px 32px;
      box-shadow: var(--shadow-card); margin-bottom: 32px;
    }
    .pin-check-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .pin-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .pin-row input {
      flex: 1; min-width: 200px;
      border: 1.5px solid var(--border-dark); border-radius: 4px;
      padding: 12px 16px; font-size: 14px; font-family: var(--font-body);
      outline: none; transition: border-color 0.2s;
    }
    .pin-row input:focus { border-color: var(--text-primary); }
    .pin-row button {
      background: var(--text-primary); color: #fff;
      border: none; border-radius: 4px; padding: 12px 24px;
      font-family: var(--font-body); font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .pin-row button:hover { background: #333; }
    .pin-result { margin-top: 14px; font-size: 14px; font-weight: 600; }
    .pin-result.ok  { color: var(--green); }
    .pin-result.err { color: var(--red); }

    .delivery-opts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 18px; }
    .d-opt-card {
      border: 1.5px solid var(--border); border-radius: 6px;
      padding: 20px 16px; text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .d-opt-card:hover { border-color: var(--text-primary); box-shadow: var(--shadow-hover); }
    .d-opt-card .icon { font-size: 28px; margin-bottom: 8px; }
    .d-opt-card .label { font-size: 13px; font-weight: 700; }
    .d-opt-card .days  { font-size: 12px; color: var(--text-muted); margin: 4px 0; }
    .d-opt-card .price { font-size: 15px; font-weight: 700; }
    .d-opt-card .badge { display: inline-block; background: var(--tag-bg); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 2px; letter-spacing: 0.1em; margin-bottom: 4px; }

    /* Order tracker */
    .orders-section { margin-top: 40px; }
    .orders-section h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
    .no-orders { background: var(--off-white); border: 1px dashed var(--border-dark); border-radius: 6px; padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .no-orders a { color: var(--brand-orange); font-weight: 700; }

    .order-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 6px; padding: 24px 28px; margin-bottom: 20px;
      box-shadow: var(--shadow-card);
    }
    .order-card-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .order-id { font-size: 15px; font-weight: 700; }
    .order-date { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .order-delivery-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--off-white); border: 1px solid var(--border);
      border-radius: 4px; padding: 5px 12px;
      font-size: 12px; font-weight: 700; color: var(--text-primary);
    }
    .order-address { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.7; }
    .order-address strong { color: var(--text-primary); font-size: 13px; }

    /* Tracking stepper */
    .stepper { display: flex; align-items: flex-start; gap: 0; }
    .step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
    .step:not(:last-child)::after {
      content: '';
      position: absolute; top: 15px; left: 50%;
      width: 100%; height: 2px; background: var(--border);
      z-index: 0;
    }
    .step.done:not(:last-child)::after { background: var(--green); }
    .step-circle {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--border); border: 2px solid var(--border-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; position: relative; z-index: 1;
      transition: background 0.3s;
    }
    .step.done .step-circle { background: var(--green); border-color: var(--green); color: #fff; }
    .step.active .step-circle { background: var(--brand-orange); border-color: var(--brand-orange); color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,82,0,0.4)} 50%{box-shadow:0 0 0 8px rgba(192,82,0,0)} }
    .step-label { font-size: 10.5px; font-weight: 600; text-align: center; margin-top: 8px; color: var(--text-muted); line-height: 1.3; }
    .step.done .step-label, .step.active .step-label { color: var(--text-primary); }

    @media(max-width: 620px) {
      .delivery-opts-grid { grid-template-columns: 1fr; }
      .stepper { flex-direction: column; gap: 0; align-items: flex-start; }
      .step { flex-direction: row; gap: 14px; width: 100%; align-items: center; flex: unset; }
      .step:not(:last-child)::after { top: 30px; left: 15px; width: 2px; height: 100%; }
      .step-label { text-align: left; margin-top: 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>Easy buy</h1>
</header>
<nav>
  <a href="index.html">Home</a>
  <a href="latest.html">Latest</a>
  <a href="contact.html">Contact Us</a>
</nav>

<div class="delivery-page">

  <h2>🚚 Delivery &amp; Order Tracking</h2>

  <!-- Pincode Checker -->
  <div class="pin-check-card">
    <h3>📍 Check Delivery to Your Pincode</h3>
    <div class="pin-row">
      <input type="text" id="page-pincode" placeholder="Enter 6-digit pincode (e.g. 600001)" maxlength="6">
      <button onclick="checkPagePin()">Check Availability</button>
    </div>
    <p class="pin-result" id="page-pin-result"></p>

    <!-- Delivery options shown after check -->
    <div class="delivery-opts-grid" id="page-delivery-opts" style="display:none">
      <div class="d-opt-card">
        <div class="icon">📦</div>
        <div class="badge" style="visibility:hidden">x</div>
        <div class="label">Standard</div>
        <div class="days">5–7 business days</div>
        <div class="price" style="color:var(--green)">FREE</div>
      </div>
      <div class="d-opt-card">
        <div class="icon">⚡</div>
        <div class="badge">POPULAR</div>
        <div class="label">Express</div>
        <div class="days">2–3 business days</div>
        <div class="price" style="color:var(--brand-orange)">₹99</div>
      </div>
      <div class="d-opt-card">
        <div class="icon">🚀</div>
        <div class="badge">FASTEST</div>
        <div class="label">Same Day</div>
        <div class="days">Today by 10 PM</div>
        <div class="price" style="color:var(--red)">₹199</div>
      </div>
    </div>
  </div>

  <!-- My Orders -->
  <div class="orders-section">
    <h3>📋 My Orders</h3>
    <div id="orders-list"></div>
  </div>

</div>

<script src="shop.js"></script>
<script>
  function checkPagePin () {
    const pin = document.getElementById('page-pincode').value.trim();
    const result = document.getElementById('page-pin-result');
    const opts = document.getElementById('page-delivery-opts');

    if (!/^\d{6}$/.test(pin)) {
      result.textContent = '⚠️ Please enter a valid 6-digit pincode.';
      result.className = 'pin-result err';
      opts.style.display = 'none';
      return;
    }
    result.textContent = `✅ Great news! We deliver to ${pin}. Choose your preferred option:`;
    result.className = 'pin-result ok';
    opts.style.display = 'grid';
  }

  // Pincode enter key
  document.getElementById('page-pincode').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPagePin();
  });

  // Render orders from localStorage
  function renderOrders () {
    const orders = JSON.parse(localStorage.getItem('myshop_orders')) || [];
    const list = document.getElementById('orders-list');

    if (!orders.length) {
      list.innerHTML = `
        <div class="no-orders">
          <p style="font-size:32px;margin-bottom:12px">📭</p>
          <p>No orders placed yet.</p>
          <p style="margin-top:8px"><a href="index.html">Start shopping →</a></p>
        </div>`;
      return;
    }

    list.innerHTML = orders.map((order, idx) => {
      const steps = order.steps || [];
      // Simulate progress based on index (newest = step 1, older = further along)
      const doneCount = Math.min(idx + 1, steps.length);
      const stepsHtml = steps.map((step, si) => {
        const isDone   = si < doneCount;
        const isActive = si === doneCount - 1 && doneCount < steps.length;
        const cls = isDone ? 'done' : isActive ? 'active' : '';
        return `
          <div class="step ${cls}">
            <div class="step-circle">${isDone ? '✓' : si + 1}</div>
            <div class="step-label">${step.label}</div>
          </div>`;
      }).join('');

      const addr = order.address || {};
      const d    = new Date(order.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

      return `
        <div class="order-card">
          <div class="order-card-header">
            <div>
              <div class="order-id">Order #${order.id}</div>
              <div class="order-date">Placed on ${d}</div>
            </div>
            <div class="order-delivery-badge">
              ${order.delivery?.icon || '📦'} ${order.delivery?.label || 'Standard'} · ${order.delivery?.days || ''}
            </div>
          </div>

          <div class="order-address">
            <strong>${addr.name || ''}</strong><br>
            ${addr.addr1 || ''}, ${addr.city || ''}, ${addr.state || ''}<br>
            📞 ${addr.phone || ''}
          </div>

          <div class="stepper">${stepsHtml}</div>
        </div>`;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', renderOrders);
</script>
</body>
</html>
