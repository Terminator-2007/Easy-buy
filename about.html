<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Buy - About Us</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="stylebg.css">
  <style>
    .placeholder-wrap {
      max-width: 660px;
      margin: 80px auto 120px;
      padding: 0 24px;
      text-align: center;
    }
    .placeholder-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }
    .placeholder-wrap h2 {
      font-family: var(--font-logo);
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 16px;
    }
    .placeholder-wrap p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 500px;
      margin: 0 auto 32px;
    }
    .wip-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 4px;
      padding: 8px 18px;
      font-size: 12.5px;
      font-weight: 700;
      color: #795548;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .back-links {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .back-links a {
      padding: 12px 28px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 3px;
      border: 1.5px solid var(--text-primary);
      transition: all var(--transition);
    }
    .back-links a.primary {
      background: var(--text-primary);
      color: var(--white);
    }
    .back-links a.primary:hover { background: #333; }
    .back-links a.secondary { color: var(--text-primary); }
    .back-links a.secondary:hover { background: var(--text-primary); color: var(--white); }
  </style>
</head>
<body>

<header>
  <h1>Easy Buy</h1>
</header>
<nav>
  <a href="index.html">Home</a>
  <a href="latest.html">Latest</a>
  <a href="contact.html">Contact Us</a>
</nav>

<div class="placeholder-wrap">
  <span class="placeholder-icon">🏬</span>
  <h2>About Us</h2>
  <div class="wip-badge">🚧 Coming Soon — Page Under Development</div>
  <p>Easy Buy is India's one-stop destination for fashion — quality clothing, accessories, and footwear at unbeatable prices.</p>
  <div class="back-links">
    <a href="index.html" class="primary">← Shop Now</a>
    <a href="contact.html" class="secondary">Contact Us</a>
  </div>
</div>

<script src="shop.js"></script>
</body>
</html>
